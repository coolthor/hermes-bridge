<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect x="6" y="6" width="908" height="328" rx="18" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="34" y="46" font-size="18" font-weight="700" fill="#0f172a">How Muninn connects to your agent</text>
  <text x="34" y="69" font-size="12.5" fill="#64748b">Direct peer-to-peer · end-to-end encrypted · zero-operator</text>

  <defs>
    <marker id="aP" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7c3aed"/></marker>
    <marker id="aG" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/></marker>
  </defs>

  <!-- Phone -->
  <rect x="34" y="118" width="200" height="124" rx="14" fill="#0f172a"/>
  <text x="134" y="166" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Muninn</text>
  <text x="134" y="190" font-size="12" fill="#94a3b8" text-anchor="middle">iPhone · anywhere</text>
  <text x="134" y="214" font-size="11" fill="#d4af37" text-anchor="middle">scan QR once</text>

  <!-- Bridge -->
  <rect x="360" y="118" width="210" height="124" rx="14" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="465" y="166" font-size="16" font-weight="700" fill="#6d28d9" text-anchor="middle">hermes-bridge</text>
  <text x="465" y="190" font-size="12" fill="#7c3aed" text-anchor="middle">your machine</text>
  <text x="465" y="214" font-size="11" fill="#9333ea" text-anchor="middle">supervised daemon</text>

  <!-- Dashboard -->
  <rect x="686" y="118" width="200" height="124" rx="14" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="786" y="166" font-size="15" font-weight="700" fill="#0f172a" text-anchor="middle">Hermes dashboard</text>
  <text x="786" y="190" font-size="12" fill="#64748b" text-anchor="middle">WS JSON-RPC</text>
  <text x="786" y="214" font-size="11" fill="#64748b" text-anchor="middle">your agent</text>

  <!-- phone -> bridge -->
  <line x1="234" y1="180" x2="352" y2="180" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#aP)"/>
  <text x="293" y="164" font-size="11.5" font-weight="600" fill="#6d28d9" text-anchor="middle">iroh P2P</text>
  <text x="293" y="204" font-size="10" fill="#7c3aed" text-anchor="middle">QUIC · e2e enc.</text>

  <!-- bridge -> dashboard -->
  <line x1="570" y1="180" x2="678" y2="180" stroke="#64748b" stroke-width="2.5" marker-end="url(#aG)"/>
  <text x="624" y="164" font-size="10.5" fill="#475569" text-anchor="middle">127.0.0.1</text>
  <text x="624" y="204" font-size="10" fill="#94a3b8" text-anchor="middle">loopback</text>

  <text x="34" y="288" font-size="12" fill="#475569">DIRECT (NAT hole-punched) when both ends are routable — e.g. IPv6 on cellular — otherwise a public relay.</text>
  <text x="34" y="310" font-size="12" fill="#475569">No cloud account. No server of ours in the path. You run both ends.</text>
</svg>
