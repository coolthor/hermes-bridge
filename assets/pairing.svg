<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect x="6" y="6" width="908" height="368" rx="18" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="34" y="46" font-size="18" font-weight="700" fill="#0f172a">Pairing — an introduction, not a key</text>
  <text x="34" y="69" font-size="12.5" fill="#64748b">A scanned QR never grants access on its own. You approve a fingerprint; only that one device is allow-listed.</text>

  <defs>
    <marker id="gA" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#16a34a"/></marker>
    <marker id="rA" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#dc2626"/></marker>
  </defs>

  <!-- QR token -->
  <rect x="410" y="92" width="100" height="100" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
  <rect x="420" y="102" width="22" height="22" fill="none" stroke="#0f172a" stroke-width="3"/><rect x="427" y="109" width="8" height="8" fill="#0f172a"/>
  <rect x="478" y="102" width="22" height="22" fill="none" stroke="#0f172a" stroke-width="3"/><rect x="485" y="109" width="8" height="8" fill="#0f172a"/>
  <rect x="420" y="160" width="22" height="22" fill="none" stroke="#0f172a" stroke-width="3"/><rect x="427" y="167" width="8" height="8" fill="#0f172a"/>
  <rect x="452" y="132" width="7" height="7" fill="#0f172a"/><rect x="466" y="132" width="7" height="7" fill="#0f172a"/>
  <rect x="478" y="146" width="7" height="7" fill="#0f172a"/><rect x="492" y="160" width="7" height="7" fill="#0f172a"/>
  <rect x="466" y="174" width="7" height="7" fill="#0f172a"/><rect x="480" y="180" width="7" height="7" fill="#0f172a"/>
  <text x="460" y="212" font-size="12" font-weight="600" fill="#334155" text-anchor="middle">hb1 │ iroh-ticket │ one-time code</text>

  <!-- arrows -->
  <line x1="430" y1="196" x2="250" y2="250" stroke="#16a34a" stroke-width="2.5" marker-end="url(#gA)"/>
  <line x1="490" y1="196" x2="670" y2="250" stroke="#dc2626" stroke-width="2.5" marker-end="url(#rA)"/>

  <!-- You (legit) -->
  <rect x="34" y="256" width="410" height="104" rx="13" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="54" y="286" font-size="15" font-weight="700" fill="#15803d">✓  You (the operator)</text>
  <text x="54" y="312" font-size="12.5" fill="#166534">Your phone presents its NodeId; the bridge shows a fingerprint.</text>
  <text x="54" y="332" font-size="12.5" fill="#166534">You confirm it → allow-listed. Reconnects by NodeId, no re-scan.</text>

  <!-- Attacker -->
  <rect x="476" y="256" width="410" height="104" rx="13" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="496" y="286" font-size="15" font-weight="700" fill="#b91c1c">✗  Someone with a leaked QR</text>
  <text x="496" y="312" font-size="12.5" fill="#991b1b">A different device = a different NodeId = a fingerprint you won't</text>
  <text x="496" y="332" font-size="12.5" fill="#991b1b">confirm. The one-time code is already spent. The QR is useless.</text>
</svg>
